<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook — A Task List That Remembers</title>
<meta name="description" content="Daybook is a lightweight to-do list app with add, edit, complete, filter, and persistent storage.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Newsreader:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <header class="app-header">
    <h1>Daybook</h1>
    <p class="app-date" id="todayDate"></p>
  </header>

  <form class="add-form" id="addForm">
    <input
      type="text"
      id="taskInput"
      placeholder="What needs doing today?"
      aria-label="New task"
      autocomplete="off"
      required
    >
    <select id="priorityInput" aria-label="Priority">
      <option value="normal">Normal</option>
      <option value="high">High priority</option>
      <option value="low">Low priority</option>
    </select>
    <button type="submit" class="btn-add">Add</button>
  </form>

  <div class="toolbar">
    <div class="filters" id="filters" role="tablist" aria-label="Filter tasks">
      <button class="filter-btn is-active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>
    <p class="task-count" id="taskCount"></p>
  </div>

  <ul class="task-list" id="taskList" aria-live="polite"></ul>

  <p class="empty-state" id="emptyState" hidden>Nothing here yet — add your first task above.</p>

  <footer class="app-footer">
    <button class="btn-clear" id="clearCompleted">Clear completed</button>
  </footer>
</div>

<template id="taskTemplate">
  <li class="task-item" data-priority="">
    <label class="task-check">
      <input type="checkbox" class="task-checkbox">
      <span class="checkmark" aria-hidden="true"></span>
    </label>
    <span class="task-text" tabindex="0" role="textbox" aria-label="Task text, double click to edit"></span>
    <input type="text" class="task-edit-input" hidden>
    <span class="priority-tag"></span>
    <button class="task-action task-edit" aria-label="Edit task">Edit</button>
    <button class="task-action task-delete" aria-label="Delete task">Delete</button>
  </li>
</template>

<script src="script.js"></script>
</body>
</html>
