<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Personal Expense Tracker</title>
<meta name="description" content="Ledger is a personal expense tracking dashboard with transaction management, category filtering, search, and spending breakdowns.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header class="app-header">
    <div>
      <h1>Ledger</h1>
      <p class="tagline">A quiet place to watch your money move.</p>
    </div>
  </header>

  <section class="stats-grid" aria-label="Summary">
    <div class="stat-card stat-balance">
      <p class="stat-label">Balance</p>
      <p class="stat-value" id="statBalance">₹0</p>
    </div>
    <div class="stat-card stat-income">
      <p class="stat-label">Income</p>
      <p class="stat-value" id="statIncome">₹0</p>
    </div>
    <div class="stat-card stat-expense">
      <p class="stat-label">Expenses</p>
      <p class="stat-value" id="statExpense">₹0</p>
    </div>
  </section>

  <section class="main-grid">
    <div class="panel">
      <h2 class="panel-title">Add transaction</h2>
      <form id="txForm" class="tx-form">
        <div class="form-row">
          <label for="txDesc">Description</label>
          <input type="text" id="txDesc" required placeholder="e.g. Groceries, Freelance payment">
        </div>
        <div class="form-row form-row--split">
          <div>
            <label for="txAmount">Amount (₹)</label>
            <input type="number" id="txAmount" min="0.01" step="0.01" required>
          </div>
          <div>
            <label for="txType">Type</label>
            <select id="txType">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row--split">
          <div>
            <label for="txCategory">Category</label>
            <select id="txCategory">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label for="txDate">Date</label>
            <input type="date" id="txDate" required>
          </div>
        </div>
        <button type="submit" class="btn-add">Add transaction</button>
      </form>

      <h2 class="panel-title panel-title--spaced">Spending by category</h2>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="panel">
      <div class="list-controls">
        <input type="search" id="searchInput" placeholder="Search transactions…" aria-label="Search transactions">
        <select id="categoryFilter" aria-label="Filter by category">
          <option value="all">All categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Salary">Salary</option>
          <option value="Freelance">Freelance</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <ul class="tx-list" id="txList" aria-live="polite"></ul>
      <p class="empty-state" id="emptyState" hidden>No transactions match here yet.</p>
    </div>
  </section>
</div>

<template id="txTemplate">
  <li class="tx-item">
    <div class="tx-main">
      <span class="tx-desc"></span>
      <span class="tx-meta"><span class="tx-category"></span> · <span class="tx-date"></span></span>
    </div>
    <span class="tx-amount"></span>
    <button class="tx-delete" aria-label="Delete transaction">&times;</button>
  </li>
</template>

<script src="script.js"></script>
</body>
</html>
